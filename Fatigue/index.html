<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Fatigue Management System</title>
    <!-- 引入 ECharts, 网络加载-->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========== UI 配色与字体 ========== */
        :root {
            --bg-color: #F6F7F2;      /* 偏暖的米灰色背景 */
            --card-bg: #FCFCFA;       /* 极浅的卡片底色 */
            --border-color: #E6E7E3;  /* 柔和的边框 */
            --text-main: #2C2C2C;     /* 主标题颜色 */
            --text-label: #7A7B76;    /* 小写字母标签颜色 */
            --color-green: #66A590;   /* 正常绿色 */
            --color-orange: #D48C45;  /* 中度疲劳橙色 */
            --color-red: #A73A48;     /* 重度疲劳红色 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 30px; }
        
        /* 指定宽度 */
        /* .app-container { width: 100%; max-width: 1250px; }  */
        /* 这里直接用百分比 */
        .app-container { width: 100%; max-width: 95%; }

        /* ========== 顶部标题 ========== */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 30px; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; color: #999; }
        header h1 { font-size: 20px; font-weight: 400; color: var(--text-main); letter-spacing: 0.5px;}

        /* ========== 布局网格 ========== */
        .top-section { display: flex; gap: 20px; margin-bottom: 20px; }
        
        /* 头像区 (去掉沉重的灰底，改成透明干净的排版) */
        .profile-area { width: 150px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 10px;}
        /* 原来是icon，现在改为图片
        /* .avatar-icon { font-size: 110px; color: #D0D2CC; margin-bottom: 15px; } */
        .custom-avatar-img { 
            width: 110px;        /* 图片宽度 */
            height: 110px;       /* 图片高度 */
            object-fit: cover;   /* 保证图片不变形 */
            border-radius: 50%;  /* 如果你的图片是方的，这行代码会把它裁成正圆形 */
            margin-bottom: 15px; 
            border: 3px solid var(--border-color); /* 给图片加个灰色的边框，显得高级 */
        }
        .profile-area h2 { font-size: 24px; font-weight: 400; color: var(--text-main); }

        /* 右侧 4 列卡片 (原来是 3 列，现在自动适应) */
        .cards-area { flex: 1; display: flex; gap: 20px; }
        .col { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        /* 卡片精细化阴影和圆角 */
        .card { 
            background-color: var(--card-bg); 
            border-radius: 8px; 
            padding: 22px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.02); /* 极弱的阴影，增加悬浮感 */
            border: 1px solid var(--border-color); 
            display: flex; align-items: center; 
        }
        .card-tall { flex: 1; flex-direction: column; justify-content: center; text-align: center; }
        
        /* 图标变淡，不抢视觉重心 */
        .card-icon { font-size: 28px; color: #9A9C96; margin-right: 20px; width: 30px; text-align: center; }
        .card-info { display: flex; flex-direction: column; }
        .card-label { font-size: 11px; color: var(--text-label); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; font-weight: 600; }
        
        /* 这里的 card-value 就是用来显示具体数字（比如 75）的样式 */
        .card-value { font-size: 28px; font-weight: 400; color: var(--text-main); }
        /* 为了让 bpm 或 /min 这种单位字号小一点，额外加一个样式 */
        .unit-text { font-size: 14px; color: var(--text-label); margin-left: 4px; }

        /* 大脑特有样式 */
        /* .brain-icon { font-size: 80px; color: #C4C6C0; margin-bottom: 15px; } 弱化大脑厚重感 */
        .custom-brain-img { 
            width: 90px;       /* 控制大脑图片大小 */
            height: 90px;
            object-fit: contain; /* 保持图片比例 */
            margin-bottom: 15px; 
            /* 过渡动画：让后面JS加发光颜色时，有个平滑渐变的过程 */
            transition: filter 0.5s ease; 
        }
        .status-value { font-size: 28px; font-weight: 400; margin: 8px 0; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .status-desc { font-size: 13px; color: var(--text-label); }

        /* 状态颜色类 (供 JS 切换使用) */
        .text-green { color: var(--color-green); }
        .text-orange { color: var(--color-orange); }
        .text-red { color: var(--color-red); }

        /* ========== 底部波形图 ========== */
        /* 波形相关的在这里修改！！！ */
        .chart-card { 
            background-color: var(--card-bg); border-radius: 8px; padding: 20px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.02); border: 1px solid var(--border-color);
            position: relative; /* 为警告图标做绝对定位准备 */
        }
        #chart-container { width: 100%; height: 450px; }
        
        /* 隐藏的图表警告小三角 (通过 JS 控制显示) */
        #chart-warning {
            position: absolute;
            bottom: 60px;
            right: 25%;
            font-size: 24px;
            color: var(--color-red);
            display: none; /* 默认隐藏 */
        }
    </style>
</head>

<!-- 这是 HTML 的主体部分，所有可见内容都在这里面  -->
<body>

<div class="app-container">
    <header>
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Fatigue Management System</h1>
        <i class="fa-solid fa-share-nodes"></i>
    </header>

    <div class="top-section">
        <!-- 1. 头像区 -->
        <div class="profile-area">
            <!-- 把i标签注释掉，换成img标签 -->
            <!-- <i class="fa-solid fa-user-astronaut avatar-icon"></i> 换了个更有设计感的头像图标 -->
            <img src="/static/my_avatar.png" alt="Avatar" class="custom-avatar-img" id="ui-avatar">
            <h2>Joyce</h2>
        </div>

        <!-- 2. 数据卡片区 (一共4列了) -->
        <div class="cards-area">
            
            <!-- 第 1 列：用户 和 时间 -->
            <div class="col">
                <div class="card">
                    <i class="fa-regular fa-user card-icon"></i>
                    <div class="card-info">
                        <span class="card-label">USER</span>
                        <span class="card-value">Joyce</span>
                    </div>
                </div>
                <div class="card">
                    <i class="fa-regular fa-clock card-icon"></i> <!-- 图标换成时钟了 -->
                    <div class="card-info">
                        <span class="card-label">TIME</span>
                        <!-- 【新手注意】id="ui-time" 是一个“身份证号”。
                             后面我们在 JS 代码里，就能通过这个 id 找到这个位置，然后把里面的数字实时替换掉。 -->
                        <span class="card-value" id="ui-time">--:--:--</span>
                    </div>
                </div>
            </div>

            <!-- 第 2 列：核心的疲劳状态评估 (不变) -->
            <div class="col">
                <div class="card card-tall">
                    <!-- 这里同样修改 -->
                    <!-- <i class="fa-solid fa-brain brain-icon" id="ui-brain-icon"></i> -->
                    <img src="/static/my_brain.png" alt="Brain" class="custom-brain-img" id="ui-brain-img">
                    <span class="card-label">BRAIN EVALUATION</span>
                    <div class="status-value text-green" id="ui-fatigue-status">
                        <span>Non-Fatigue</span>
                        <i class="fa-solid fa-circle-check" style="font-size: 20px;"></i>
                    </div>
                    <span class="status-desc" id="ui-fatigue-desc">Status: Normal</span>
                </div>
            </div>

            <!-- 第 3 列：新增的心率(HR)和呼吸率(RR) -->
            <div class="col">
                <div class="card">
                    <!-- fa-heart-pulse 是心电图图标，加了一点红色点缀 -->
                    <i class="fa-solid fa-heart-pulse card-icon" style="color: #A73A48;"></i>
                    <div class="card-info">
                        <span class="card-label">HEART RATE</span>
                        <span class="card-value">
                            <!-- JS 会修改 id="ui-hr" 里面的值 -->
                            <span id="ui-hr">--</span> 
                            <span class="unit-text">bpm</span> <!-- 单位: 每分钟心跳次数 -->
                        </span>
                    </div>
                </div>
                <div class="card">
                    <!-- fa-lungs 是肺部的图标，代表呼吸 -->
                    <i class="fa-solid fa-lungs card-icon" style="color: #66A590;"></i>
                    <div class="card-info">
                        <span class="card-label">RESP RATE</span>
                        <span class="card-value">
                            <!-- JS 会修改 id="ui-rr" 里面的值 -->
                            <span id="ui-rr">--</span>
                            <span class="unit-text">/min</span> <!-- 单位: 呼吸次数/分钟 -->
                        </span>
                    </div>
                </div>
            </div>

            <!-- 第 4 列：温度和电池 (按要求保持固定数值) -->
            <div class="col">
                <div class="card">
                    <i class="fa-solid fa-temperature-half card-icon"></i>
                    <div class="card-info">
                        <span class="card-label">AMBIENT TEMP</span>
                        <span class="card-value">27°C</span> <!-- 这里按要求设为定值 -->
                    </div>
                </div>
                <div class="card">
                    <i class="fa-solid fa-battery-full card-icon"></i>
                    <div class="card-info">
                        <span class="card-label">BATTERY</span>
                        <span class="card-value">100%</span> <!-- 定值 -->
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- 下半部分：波形图 -->
    <div class="chart-card">
        <!-- 动态警告三角 -->
        <i class="fa-solid fa-triangle-exclamation" id="chart-warning"></i>
        <div id="chart-container"></div>
    </div>
</div>

<script>
    // ========== 1. 初始化 ECharts 样式  ==========
    // 类似 Python 里的实例化对象： chart = ECharts(div)
    var chartDom = document.getElementById('chart-container');
    var myChart = echarts.init(chartDom);
    // init数组
    var dataQueue = new Array(150).fill(0); // 增加点数让波形更密一些

    // 定义图标长什么样（颜色、线条粗细、坐标轴）
    var option = {
        animation: false,   // 关闭动画，实时更新更流畅
        // 标题和网格
        title: { text: 'Electrical signals (a.u.)', left: 'left', top: 0, textStyle: { fontSize: 13, fontWeight: 400, color: '#333' } },
        grid: { left: '4%', right: '3%', bottom: '15%', top: '20%', containLabel: true },
        xAxis: { 
            type: 'category', 
            name: 'Time (s)', nameLocation: 'middle', nameGap: 25,
            axisLabel: { show: false }, 
            axisTick: { show: false },
            axisLine: { lineStyle: { color: '#999' } } // 底部轴线
        },

        // 这里需要调整！
        yAxis: { 
            type: 'value',
            /////////////////////////////
            min: -1.5, max: 1.5,  
            /////////////////////////////
            splitLine: { lineStyle: { color: '#F0F0F0' } }, // 极浅的水平网格线
            axisLabel: { color: '#999' }
        },
        series:[{
            type: 'line',   // 折线图
            data: dataQueue,    // 绑定上面建的list
            showSymbol: false,  // 不显示折线上的小圆点
            smooth: true,
            lineStyle: { color: '#A73A48', width: 2 } // 原图的暗红波形色
        }]
    };
    myChart.setOption(option);

    // ========== 2. DOM 元素预获取 ==========
    // 【新手注意】document.getElementById 的意思就是：在整个 HTML 文档里，
    // 把带有对应 ID 名字（也就是上文 html 里的标签）的那个“盒子”抓过来，存进一个变量里。
    // 这样等下我们直接修改这个变量，网页上的字就会变。
    
    // 疲劳状态相关的元素
    const uiStatus = document.getElementById('ui-fatigue-status');
    const uiDesc = document.getElementById('ui-fatigue-desc');
    const uiWarning = document.getElementById('chart-warning');
    const uiBrain = document.getElementById('ui-brain-img');

    // 新增：数值展示相关的元素
    const uiTime = document.getElementById('ui-time'); // 抓取显示时间的盒子
    const uiHr = document.getElementById('ui-hr');     // 抓取显示心率的盒子
    const uiRr = document.getElementById('ui-rr');     // 抓取显示呼吸率的盒子

    // 记录上一次的状态，防止 UI 重复渲染闪烁
    let lastFatigue = -1; 

    // ========== 向后端要数据 ==========
    async function fetchAndUpdateData() {
        try {
            // 发起请求，向后端的 /api/get_data 接口要数据
            let response = await fetch('/api/get_data');
            let result = await response.json();     // 把返回的数据解析成 JS 字典（对象）
            
            // 1. 更新波形图
            dataQueue.push(result.value);
            dataQueue.shift();
            myChart.setOption({ series: [{ data: dataQueue }] });

            // 2. 更新纯数值显示 (心率、呼吸率、时间)
            // 【新手注意】innerText 的意思是“替换这个标签内部的文字”。
            // 我们把后端传过来的数据（比如 result.heart_rate）塞进 HTML 盒子里去。
            uiTime.innerText = result.time;
            uiHr.innerText = result.heart_rate;
            uiRr.innerText = result.resp_rate;

            // 3. 更新疲劳状态 UI (0=正常, 1=中度, 2=重度)
            let currentFatigue = result.fatigue;
            
            // 只有当状态发生变化时，才去修改 DOM（提高性能）
            if (currentFatigue !== lastFatigue) {
                lastFatigue = currentFatigue;

                if (currentFatigue === 0) {
                    uiStatus.innerHTML = `<span>Non-Fatigue</span> <i class="fa-solid fa-circle-check" style="font-size: 20px;"></i>`;
                    uiStatus.className = 'status-value text-green';
                    uiDesc.innerText = 'Status: Normal';
                    // 正常状态没有发光
                    uiBrain.style.filter = 'none'; 
                    uiWarning.style.display = 'none'; // 隐藏图表上的小三角
                } 
                else if (currentFatigue === 1) {
                    uiStatus.innerHTML = `<span>Mild Fatigue</span> <i class="fa-solid fa-triangle-exclamation" style="font-size: 20px;"></i>`;
                    uiStatus.className = 'status-value text-orange';
                    uiDesc.innerText = 'Status: Warning';
                    // 橙色发光效果
                    // 叠加两层 drop-shadow 可以让光晕更“厚实”且颜色更浓艳
                    // 中度使用较明亮的金橙色 (#FFD700 和 #FF8C00 叠加)
                    uiBrain.style.filter = "drop-shadow(0px 0px 8px #FFD700) drop-shadow(0px 0px 20px #FF8C00)"; 
                    uiWarning.style.display = 'block'; 
                    uiWarning.className = 'fa-solid fa-triangle-exclamation text-orange'; // 波形区出现橙色三角
                } 
                else if (currentFatigue === 2) {
                    uiStatus.innerHTML = `<span>Severe Fatigue</span> <i class="fa-solid fa-circle-exclamation" style="font-size: 20px;"></i>`;
                    uiStatus.className = 'status-value text-red';
                    uiDesc.innerText = 'Status: Critical Danger';
                    // 修复了 uiBrainImg 的拼写错误(应为 uiBrain) 
                    // 重度使用纯红与深红色的叠加产生强烈的危险感 (#FF0000 和 #8B0000)
                    uiBrain.style.filter = "drop-shadow(0px 0px 10px #FF0000) drop-shadow(0px 0px 25px #8B0000)"; 
                    uiWarning.style.display = 'block';
                    uiWarning.className = 'fa-solid fa-triangle-exclamation text-red'; // 波形区出现红色三角
                }
            }
        } catch (error) {
            console.error("数据获取失败:", error);
        }
    }

    // ========== 3. 定时器，每100毫秒调用一次fetchAndUpdateData函数 ==========
    setInterval(fetchAndUpdateData, 100);
    // 监听窗口缩放，让图表自适应调整大小
    window.addEventListener('resize', () => myChart.resize());
</script>

</body>
</html>
