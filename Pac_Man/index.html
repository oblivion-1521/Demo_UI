<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>手势识别验证 Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f9f9f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .trial-text { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 10px;}
        .prompt-text { font-size: 32px; font-weight: bold; color: #007bff; }
        .success-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #28a745;
            display: none;
            background: rgba(255,255,255,0.95);
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="trial-text" id="trial-display">Trial 1 / 5</div>
        <div class="prompt-text" id="prompt-display">等待游戏开始...</div>
    </div>
    
    <div id="success-msg" class="success-text">🎉 本轮通关成功！</div>

    <canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const GRID_SIZE = 80; 
    const PACMAN_RADIUS = 25;
    const DOT_RADIUS = 18;
    const HOLD_TIME_MS = 2000; 
    
    const DART_TIME = 200; 
    const RETURN_TIME = 250; 

    const CX = canvas.width / 2;
    const CY = canvas.height / 2;

    let state = {
        trial: 1,
        maxTrials: 5, //[修改] 这里改为总共5轮
        pathLogic:[], 
        currentDotIdx: 1, 
        pLogic: { x: 0, y: 0 }, 
        cam: { x: 0, y: 0 },    
        direction: 0,           
        status: 'IDLE',         
        animStart: 0,
        currentInput: null
    };

    //[修复] 建立 WebSocket 并增加断线重连逻辑，防止 WSL 环境中长时间挂机导致默默掉线
    let ws;
    function connectWebSocket() {
        ws = new WebSocket(`ws://${location.host}/ws`);
        ws.onmessage = function(event) {
            state.currentInput = parseInt(event.data);
            
            if (state.status === 'IDLE') {
                checkInput();
            } 
            else if (state.status === 'HOLDING') {
                let targetDot = state.pathLogic[state.currentDotIdx];
                if (state.currentInput !== targetDot.num) {
                    state.status = 'IDLE'; 
                }
            }
        };
        ws.onclose = function() {
            setTimeout(connectWebSocket, 1000); // 断开后自动1秒重连
        };
    }
    connectWebSocket();

    function initLevel() {
        state.pathLogic =[];
        state.pathLogic.push({x: 0, y: 0, num: 0, isHold: false});
        
        let numBends = Math.floor(Math.random() * 2) + 1; // 随机 1 到 2 次拐弯 (对应 2 或 3 个线段)
        let segments =[];
        
        // 【修改部分开始】缩减每段生成的豆子数量，控制总数为 5~6 个
        if (numBends === 1) {
            // 2 个线段：第一段固定生成 3 个，第二段生成 2 到 3 个（总计 5~6 个）
            segments =[3, Math.floor(Math.random() * 2) + 2];
        } else {
            // 3 个线段：前两段固定生成 2 个，第三段生成 1 到 2 个（总计 5~6 个）
            segments =[2, 2, Math.floor(Math.random() * 2) + 1]; 
        }
        // 【修改部分结束】

        let currX = 0, currY = 0;
        let dirs =[
            {dx: 1, dy: 0}, {dx: 0, dy: 1}, 
            {dx: -1, dy: 0}, {dx: 0, dy: -1}
        ];
        let dirIdx = Math.floor(Math.random() * 4); 

        let lastNum = -1;
        for(let i = 0; i < segments.length; i++) {
            for(let j = 0; j < segments[i]; j++) {
                currX += dirs[dirIdx].dx * GRID_SIZE;
                currY += dirs[dirIdx].dy * GRID_SIZE;
                
                let num;
                do {
                    num = Math.floor(Math.random() * 10) + 1;
                } while (num === lastNum); // 确保相邻豆子数字不重复
                lastNum = num;
                
                state.pathLogic.push({ x: currX, y: currY, num: num, isHold: (num >= 8) });
            }
            // 随机左转或右转 (加 1 或 3 等效于 90 度和 270 度转向)
            let turn = (Math.random() < 0.5) ? 1 : 3;
            dirIdx = (dirIdx + turn) % 4;
        }

        state.currentDotIdx = 1; 
        state.pLogic = {x: 0, y: 0};
        state.cam = {x: 0, y: 0};
        state.status = 'IDLE';
        updateDirection();
        
        document.getElementById('trial-display').innerText = `Trial ${state.trial} / ${state.maxTrials}`;
        updatePrompt();

        if (state.currentInput !== null && state.currentDotIdx < state.pathLogic.length) {
            if (state.currentInput === state.pathLogic[state.currentDotIdx].num) {
                checkInput();
            }
        }
    }

    function updateDirection() {
        if (state.currentDotIdx < state.pathLogic.length) {
            let target = state.pathLogic[state.currentDotIdx];
            let prev = state.pathLogic[state.currentDotIdx - 1];
            state.direction = Math.atan2(target.y - prev.y, target.x - prev.x);
        }
    }

    function checkInput() {
        if (state.status !== 'IDLE') return;
        let targetDot = state.pathLogic[state.currentDotIdx];
        
        if (state.currentInput === targetDot.num) {
            if (targetDot.isHold) {
                state.status = 'HOLDING';
                state.animStart = Date.now();
            } else {
                state.status = 'DARTING';
                state.animStart = Date.now();
            }
        }
    }

    function updatePrompt() {
        if(state.currentDotIdx < state.pathLogic.length) {
            let n = state.pathLogic[state.currentDotIdx].num;
            let type = state.pathLogic[state.currentDotIdx].isHold ? "需保持2秒" : "瞬间触发";
            document.getElementById('prompt-display').innerText = `现在请比手势:[ ${n} ]  (${type})`;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let targetDot = state.pathLogic[state.currentDotIdx];
        let prevDot = state.pathLogic[state.currentDotIdx - 1];

        if (state.status === 'HOLDING') {
            state.pLogic.x = prevDot.x;
            state.pLogic.y = prevDot.y;

            let elapsed = Date.now() - state.animStart;
            let p = elapsed / HOLD_TIME_MS;
            
            if (p >= 1) {
                state.status = 'DARTING';
                state.animStart = Date.now();
            }
        }
        else if (state.status === 'DARTING') {
            let p = (Date.now() - state.animStart) / DART_TIME;
            if (p >= 1) {
                p = 1;
                state.status = 'RETURNING';
                state.animStart = Date.now();
            }
            state.pLogic.x = prevDot.x + (targetDot.x - prevDot.x) * p;
            state.pLogic.y = prevDot.y + (targetDot.y - prevDot.y) * p;
        } 
        else if (state.status === 'RETURNING') {
            let p = (Date.now() - state.animStart) / RETURN_TIME;
            if (p >= 1) {
                p = 1;
                state.currentDotIdx++;
                if (state.currentDotIdx >= state.pathLogic.length) {
                    state.status = 'LEVEL_COMPLETE';
                    document.getElementById('prompt-display').innerText = "";
                    let msg = document.getElementById('success-msg');
                    
                    // [修改] 如果全部通关完成，展示最终胜利并停止游戏
                    if (state.trial >= state.maxTrials) {
                        msg.innerText = "🏆 恭喜通关所有挑战！";
                        msg.style.display = 'block';
                    } else {
                        msg.innerText = "🎉 本轮通关成功！";
                        msg.style.display = 'block';
                        setTimeout(() => {
                            msg.style.display = 'none';
                            state.trial++;
                            initLevel();
                        }, 2000);
                    }
                } else {
                    state.status = 'IDLE';
                    updateDirection();
                    updatePrompt();
                    
                    if (state.currentInput === state.pathLogic[state.currentDotIdx].num) {
                        checkInput(); 
                    }
                }
            }
            state.pLogic.x = targetDot.x;
            state.pLogic.y = targetDot.y;
            state.cam.x = prevDot.x + (targetDot.x - prevDot.x) * p;
            state.cam.y = prevDot.y + (targetDot.y - prevDot.y) * p;
        }

        let startIdx = state.currentDotIdx;
        if (state.status === 'RETURNING') {
            startIdx = state.currentDotIdx + 1; 
        }

        for (let i = startIdx; i < state.pathLogic.length; i++) {
            let dot = state.pathLogic[i];
            
            let screenX = dot.x - state.cam.x + CX;
            let screenY = dot.y - state.cam.y + CY;

            ctx.beginPath();
            ctx.arc(screenX, screenY, DOT_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = dot.isHold ? "#ff6b81" : "#95a5a6";
            ctx.fill();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(dot.num, screenX, screenY);
        }

        let pacScreenX = state.pLogic.x - state.cam.x + CX;
        let pacScreenY = state.pLogic.y - state.cam.y + CY;
        drawPacman(pacScreenX, pacScreenY, state.direction, state.status === 'DARTING');

        if (state.status === 'HOLDING') {
            let elapsed = Date.now() - state.animStart;
            let p = elapsed / HOLD_TIME_MS;
            drawModalCountdown(p, targetDot.num);
        }

        requestAnimationFrame(draw);
    }

    function drawPacman(x, y, dir, isMoving) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(dir);

        let mouthAngle = 0;
        if (isMoving) {
            mouthAngle = (Math.sin(Date.now() / 100) + 1) * 0.15 * Math.PI;
        } else {
            mouthAngle = 0.15 * Math.PI; 
        }

        ctx.beginPath();
        ctx.moveTo(0, 0); 
        ctx.arc(0, 0, PACMAN_RADIUS, mouthAngle, Math.PI * 2 - mouthAngle);
        ctx.closePath(); 
        ctx.fillStyle = "#f1c40f"; 
        ctx.fill();
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.stroke();

        let isFacingLeft = Math.abs(dir) > Math.PI / 2;
        let eyeY = isFacingLeft ? PACMAN_RADIUS / 2.5 : -PACMAN_RADIUS / 2.5;

        ctx.beginPath();
        ctx.arc(0, eyeY, 3, 0, Math.PI * 2);
        ctx.fillStyle = "#000";
        ctx.fill();
        ctx.restore();
    }

    function drawModalCountdown(progress, num) {
        ctx.save();
        
        let boxWidth = 240;
        let boxHeight = 260;
        let boxX = CX - boxWidth/2;
        let boxY = CY - boxHeight/2 - 20;

        ctx.shadowColor = 'rgba(0,0,0,0.2)';
        ctx.shadowBlur = 15;
        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 15);
        ctx.fill();
        ctx.shadowBlur = 0; 

        ctx.fillStyle = "#333";
        ctx.font = "bold 22px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.fillText("保持该手势", CX, boxY + 40);
        
        let fanCenterY = boxY + 140;
        let fanRadius = 60;
        ctx.beginPath();
        ctx.arc(CX, fanCenterY, fanRadius, 0, Math.PI*2);
        ctx.fillStyle = "#eee";
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = "#ddd";
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(CX, fanCenterY);
        ctx.arc(CX, fanCenterY, fanRadius, -Math.PI/2, -Math.PI/2 + (Math.PI * 2 * progress));
        ctx.fillStyle = "#ff6b81"; 
        ctx.fill();

        ctx.beginPath();
        ctx.arc(CX, fanCenterY, fanRadius - 15, 0, Math.PI*2);
        ctx.fillStyle = "#fff";
        ctx.fill();

        ctx.fillStyle = "#333";
        ctx.font = "bold 32px Arial";
        ctx.textBaseline = "middle";
        ctx.fillText(num, CX, fanCenterY);

        ctx.restore();
    }

    initLevel();
    draw();

</script>
</body>
</html>
